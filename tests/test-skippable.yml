name: Test skippable jobs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          needs: '{"job1":{"result":"success","outputs":{}},"optional-job":{"result":"skipped","outputs":{}}}'
          skippable: 'optional-job'
      - name: Assert action completed without failure when skippable job is skipped
        run: |
          echo "Action completed successfully with skippable job skipped"
          echo "PASS"
