name: Test basic usage - all jobs succeeded
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          needs: '{"job1":{"result":"success","outputs":{}},"job2":{"result":"success","outputs":{}}}'
      - name: Assert action completed without failure
        run: |
          echo "Action completed successfully with all jobs succeeded"
          echo "PASS"
